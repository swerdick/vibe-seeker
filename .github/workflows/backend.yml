name: Build and Scan Backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        run: go test ./... -short

      - name: Vet
        run: go vet ./...

      # TODO: Add golangci-lint (see 14-static-analysis-and-security.md)
      # - name: golangci-lint
      #   uses: golangci/golangci-lint-action@v6
      #   with:
      #     working-directory: backend

      # TODO: Add govulncheck
      # - name: govulncheck
      #   run: |
      #     go install golang.org/x/vuln/cmd/govulncheck@latest
      #     govulncheck ./...

      # TODO: Add integration tests (testcontainers-go, see 13-testing.md)
      # - name: Run integration tests
      #   run: go test ./... -json -coverprofile=coverage.out

      - name: Build container
        run: docker build -f Containerfile .

      # TODO: Add container scanning (see 14-static-analysis-and-security.md)
      # - name: Hadolint
      #   uses: hadolint/hadolint-action@v3.1.0
      #   with:
      #     dockerfile: backend/Containerfile
      #
      # - name: Trivy image scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: vibe-seeker-api:latest
      #     format: 'sarif'
      #     output: 'trivy-backend.sarif'
      #     severity: 'CRITICAL,HIGH'

  codeql:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: go
          source-root: backend

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
