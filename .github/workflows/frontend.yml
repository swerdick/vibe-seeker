name: Build and Scan Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CONTAINER_CLI: docker
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: extractions/setup-just@v4

      - name: Install dependencies
        run: npm ci

      - name: Run CI pipeline
        run: just ci-full

      # TODO: Add npm audit (see 14-static-analysis-and-security.md)
      # - name: npm audit
      #   run: npm audit --omit=dev

      # TODO: Add container scanning (see 14-static-analysis-and-security.md)
      # - name: Hadolint
      #   uses: hadolint/hadolint-action@v3.1.0
      #   with:
      #     dockerfile: frontend/Containerfile

  codeql:
    name: CodeQL (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          source-root: frontend

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4

  frontend-ok:
    if: always()
    needs: [ci, codeql]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.ci.result }}" != "success" || "${{ needs.codeql.result }}" != "success" ]]; then
            echo "CI or CodeQL failed"
            exit 1
          fi

