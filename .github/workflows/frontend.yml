name: Build and Scan Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # TODO: Add Vitest unit tests (see 13-testing.md)
      # - name: Run unit tests
      #   run: npx vitest run --reporter=junit --outputFile=test-results.xml

      # TODO: Add npm audit (see 14-static-analysis-and-security.md)
      # - name: npm audit
      #   run: npm audit --omit=dev

      - name: Build
        run: npm run build

      - name: Build container
        run: docker build -f Containerfile .

      # TODO: Add container scanning (see 14-static-analysis-and-security.md)
      # - name: Hadolint
      #   uses: hadolint/hadolint-action@v3.1.0
      #   with:
      #     dockerfile: frontend/Containerfile

  codeql:
    name: CodeQL (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          source-root: frontend

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3

