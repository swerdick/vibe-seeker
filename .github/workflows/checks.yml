name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        run: go test ./... -short

      - name: Vet
        run: go vet ./...

      # TODO: Add golangci-lint (see 14-static-analysis-and-security.md)
      # - name: golangci-lint
      #   uses: golangci/golangci-lint-action@v6
      #   with:
      #     working-directory: backend

      # TODO: Add govulncheck
      # - name: govulncheck
      #   run: |
      #     go install golang.org/x/vuln/cmd/govulncheck@latest
      #     govulncheck ./...

      # TODO: Add integration tests (testcontainers-go, see 13-testing.md)
      # - name: Run integration tests
      #   run: go test ./... -json -coverprofile=coverage.out

      - name: Build container
        run: docker build -f Containerfile .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # TODO: Add Vitest unit tests (see 13-testing.md)
      # - name: Run unit tests
      #   run: npx vitest run --reporter=junit --outputFile=test-results.xml

      # TODO: Add npm audit (see 14-static-analysis-and-security.md)
      # - name: npm audit
      #   run: npm audit --omit=dev

      - name: Build
        run: npm run build

      - name: Build container
        run: docker build -f Containerfile .

